name: Deploy Cloudflare Sync

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare-sync
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check Worker syntax
        run: node --check worker.js

      - name: Test sync API behavior
        run: node ../tools/verify-sync-worker.mjs

      - name: Validate Cloudflare secrets
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_D1_DATABASE_ID"

      - name: Inject D1 database id
        shell: bash
        env:
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
        run: |
          node - <<'NODE'
          const fs = require("node:fs");
          const path = "wrangler.toml";
          const databaseId = process.env.CLOUDFLARE_D1_DATABASE_ID;
          let toml = fs.readFileSync(path, "utf8");
          toml = toml.replace(
            /database_id = "REPLACE_WITH_D1_DATABASE_ID"/,
            `database_id = "${databaseId}"`,
          );
          fs.writeFileSync(path, toml);
          NODE

      - name: Apply D1 schema
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute plan-financiero-sync-db --remote --file=./schema.sql --yes

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

